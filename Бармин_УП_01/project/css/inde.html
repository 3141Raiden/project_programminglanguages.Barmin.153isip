<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Сообщаем браузеру, что страница поддерживает обе схемы -->
  <meta name="color-scheme" content="light dark">
  <title>Светлая и тёмная тема</title>
  
  <link rel="stylesheet" href="dark tem.css">
  
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <header>
    <h1>Переключение темы</h1>
    <button id="theme-toggle" aria-label="Переключить тему">Тёмная тема</button>
    <a href="file:///home/user/%D0%A0%D0%B0%D0%B1%D0%BE%D1%87%D0%B8%D0%B9%20%D1%81%D1%82%D0%BE%D0%BB/%D0%91%D0%B0%D1%80%D0%BC%D0%B8%D0%BD_%D0%A3%D0%9F_01/project/css/home.html"><button>Васк</button></a>
  </header>

  <main>
    <p>Эта страница автоматически определяет системную тему через медиа-запрос, сохраняет выбор пользователя и плавно переключает цвета.</p>
    
    <div class="card">
      <h2>Пример карточки</h2>
      <p>Фон, текст и границы меняются в зависимости от выбранной схемы. Плавные переходы заданы через CSS-переменные.</p>
    </div>
  </main>

  <!-- Скрипт загружается после DOM -->
  <script src="script.js"></script>
</body>
</html>
